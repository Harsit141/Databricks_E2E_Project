# This is a Databricks asset bundle definition for databricks_e2e_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databricks_e2e_project
  uuid: eceb95c4-d2c5-4b62-9e64-cb03e921aaa9

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-c913ad33-9ce8.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-c913ad33-9ce8.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/harsitb2001@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/harsitb2001@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: harsitb2001@gmail.com
        level: CAN_MANAGE
